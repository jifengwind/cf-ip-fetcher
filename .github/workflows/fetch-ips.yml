name: Fetch Cloudflare Preferred IPs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'speedtest.js'
      - '.github/workflows/fetch-ips.yml'

permissions:
  contents: write

jobs:
  fetch-ips:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run IP fetcher script
        run: node speedtest.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet ips.txt; then
            echo "IP 列表无变化，跳过提交"
          else
            git add ips.txt last-update.txt
            git commit -m "🔄 Auto-update: preferred IPs [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
