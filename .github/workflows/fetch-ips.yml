name: Fetch Cloudflare Preferred IPs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/cf_ip_updater.py'
      - '.github/workflows/fetch-ips.yml'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  fetch-ips:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        run: |
          sudo apt update
          sudo apt install -y wget unzip
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt update
          sudo apt install -y google-chrome-stable
          google-chrome --version

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome 版本: $CHROME_VERSION"
          wget -O /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/$CHROME_VERSION/linux64/chromedriver-linux64.zip"
          unzip -o /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Create output directory
        run: mkdir -p output

      - name: Run IP fetcher script
        run: python scripts/cf_ip_updater.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制添加文件
          git add output/cf_preferred_ips.txt
          
          # 检查是否有变化
          if git diff --cached --quiet; then
            echo "文件内容无变化，但强制提交以同步远程仓库"
            git commit --allow-empty -m "🔄 Auto-update: preferred IPs (force sync) [$(date +'%Y-%m-%d %H:%M UTC')]"
          else
            git commit -m "🔄 Auto-update: preferred IPs [$(date +'%Y-%m-%d %H:%M UTC')]"
          fi
          
          git push

      - name: Upload IP list as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-preferred-ips
          path: output/cf_preferred_ips.txt
          retention-days: 7
