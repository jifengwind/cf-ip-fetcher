name: Fetch Cloudflare Preferred IPs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/cf_ip_updater.py'
      - '.github/workflows/fetch-ips.yml'

permissions:
  contents: write

jobs:
  fetch-ips:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium==4.15.0

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt update
          sudo apt install google-chrome-stable -y

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          CHROME_MAJOR_VERSION=$(echo $CHROME_VERSION | cut -d. -f1)
          CHROMEDRIVER_URL=$(wget -q -O - "https://googlechromelabs.github.io/chrome-for-testing/latest-patch-versions-per-build-with-downloads.json" | python3 -c "
import json, sys
data = json.load(sys.stdin)
builds = data['builds']
target_version = '$CHROME_VERSION'
for build, info in builds.items():
    if info['version'] == target_version:
        for d in info['downloads']['chromedriver']:
            if d['platform'] == 'linux64':
                print(d['url'])
                sys.exit(0)
")
          if [ -z "$CHROMEDRIVER_URL" ]; then
            CHROMEDRIVER_URL=$(wget -q -O - "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone-with-downloads.json" | python3 -c "
import json, sys
data = json.load(sys.stdin)
milestones = data['milestones']
chrome_major = '$CHROME_MAJOR_VERSION'
if chrome_major in milestones:
    for d in milestones[chrome_major]['downloads']['chromedriver']:
        if d['platform'] == 'linux64':
            print(d['url'])
")
          fi
          wget -O /tmp/chromedriver.zip "$CHROMEDRIVER_URL"
          unzip -o /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver

      - name: Create output directory
        run: mkdir -p output

      - name: Run IP fetcher script
        run: python scripts/cf_ip_updater.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet output/cf_preferred_ips.txt; then
            echo "IP 列表无变化，跳过提交"
          else
            git add output/cf_preferred_ips.txt
            git commit -m "🔄 Auto-update: preferred IPs [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Upload IP list as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-preferred-ips
          path: output/cf_preferred_ips.txt
          retention-days: 7
